<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDX5 Photo Wall - Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 25%, #d4fc79 50%, #96e6a1 75%, #a8edea 100%);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      min-height: 100vh;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .display-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 16px;
      color: #333;
      font-size: 1.5rem;
      font-weight: 700;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 20px;
      background: rgba(0,0,0,0.08);
      border: none;
      color: #555;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      text-decoration: none;
    }
    body:hover .back-btn { opacity: 1; }
    .back-btn:hover { background: rgba(0,0,0,0.12); }

    .scroll-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      padding-top: 70px;
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .feed {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding: 20px 20px 100px;
    }

    .feed-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      overflow: hidden;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .feed-card img {
      width: 100%;
      object-fit: contain;
      display: block;
    }

    .feed-card .card-info {
      padding: 16px 20px;
    }

    .feed-card .card-info .caption {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .feed-card .card-info .author {
      font-size: 0.95rem;
      color: #666;
    }

    .empty-state {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #555;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.8rem; margin-bottom: 8px; color: #333; }
    .empty-state p { color: #666; font-size: 1.1rem; }

    .controls {
      display: none;
    }

    .qr-corner {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      z-index: 150;
    }
    .qr-corner img {
      width: 150px;
      height: 150px;
      display: block;
      margin-bottom: 6px;
    }
    .qr-corner p {
      font-size: 0.85rem;
      color: #555;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="display-header">📸 PDX5 — Share Your Moment</div>
  <a class="back-btn" href="/">← Back</a>

  <div class="scroll-container" id="scrollContainer">
    <div class="feed" id="feed"></div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🖼️</div>
    <h2>No approved photos yet</h2>
    <p>Photos will appear here once a manager approves them</p>
  </div>

  <div class="controls">
    <label>
      Speed: <span id="speedLabel">30</span>px/s
      <input type="range" id="speedSlider" min="10" max="80" value="30">
    </label>
  </div>

  <div class="qr-corner" id="qrCorner">
    <img id="qrImg" alt="Scan to upload">
    <p>Scan to share</p>
  </div>

  <script>
    let photos = [];
    let scrollSpeed = 30; // pixels per second
    let isPaused = false;

    const feed = document.getElementById('feed');
    const scrollContainer = document.getElementById('scrollContainer');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');

    speedSlider.addEventListener('input', (e) => {
      scrollSpeed = parseInt(e.target.value);
      speedLabel.textContent = scrollSpeed;
    });

    // No pause on hover - keep scrolling always

    async function loadPhotos() {
      try {
        const res = await fetch('/api/photos?status=approved');
        const newPhotos = await res.json();

        if (JSON.stringify(newPhotos.map(p => p.id)) !== JSON.stringify(photos.map(p => p.id))) {
          photos = newPhotos;
          renderFeed();
        }

        document.getElementById('emptyState').style.display = photos.length === 0 ? '' : 'none';
      } catch (err) {
        console.error('Failed to load photos:', err);
      }
    }

    function renderFeed() {
      if (photos.length === 0) {
        feed.innerHTML = '';
        return;
      }

      // Show each photo only once
      feed.innerHTML = photos.map(photo => `
        <div class="feed-card">
          <img src="${photo.imageUrl}" alt="${escapeAttr(photo.caption)}" loading="lazy">
          <div class="card-info">
            ${photo.caption ? `<div class="caption">${escapeHtml(photo.caption)}</div>` : ''}
            <div class="author">Shared by ${escapeHtml(photo.submittedBy)}</div>
          </div>
        </div>
      `).join('');
    }

    function startScrolling() {
      function scrollStep() {
        if (!isPaused) {
          const maxScroll = scrollContainer.scrollHeight - scrollContainer.clientHeight;
          if (maxScroll > 0) {
            scrollContainer.scrollTop += 1;

            if (scrollContainer.scrollTop >= maxScroll) {
              isPaused = true;
              setTimeout(() => {
                scrollContainer.scrollTop = 0;
                isPaused = false;
              }, 3000);
            }
          }
        }
        setTimeout(scrollStep, 1000 / scrollSpeed);
      }
      scrollStep();

      // Also restart scrolling on fullscreen change
      document.addEventListener('fullscreenchange', () => {
        // Brief pause to let the browser settle after fullscreen transition
        isPaused = true;
        setTimeout(() => { isPaused = false; }, 500);
      });

      // Prevent Firefox from throttling by keeping activity
      setInterval(() => {
        // Keep-alive: prevents browser from throttling timers
        void scrollContainer.scrollHeight;
      }, 1000);
    }

    function escapeHtml(t) {
      if (!t) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
    function escapeAttr(t) { return (t || '').replace(/"/g, '&quot;'); }

    // Load QR code for corner display
    async function loadQR() {
      try {
        const res = await fetch('/api/qrcode');
        const data = await res.json();
        document.getElementById('qrImg').src = data.qrDataUrl;
      } catch (err) {
        document.getElementById('qrCorner').style.display = 'none';
      }
    }

    // Periodically recalculate in case images loaded late
    // (scrollTop approach handles this naturally)

    // Initialize
    loadPhotos();
    loadQR();
    startScrolling();
    setInterval(loadPhotos, 15000);
  </script>
</body>
</html>
