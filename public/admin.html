<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Photo Wall - Manager</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="main-nav">
    <span class="logo">📸 PDX5 Photo Wall</span>
    <a href="/" class="nav-link">Upload</a>
    <a href="/admin.html" class="nav-link active">Manager</a>
    <span class="spacer"></span>
    <a href="/qr.html" class="nav-link">📱 QR Code</a>
    <a href="/display.html" class="nav-link tv-btn">🖥️ TV Display</a>
  </nav>

  <div class="page" id="loginPage">
    <div class="upload-container" style="max-width:400px;">
      <h2 style="text-align:center; margin-bottom:8px;">🔒 Manager Access</h2>
      <p style="text-align:center; color:#666; margin-bottom:24px;">Enter the password to continue</p>
      <form id="loginForm">
        <div class="form-group">
          <input type="password" id="passwordInput" placeholder="Password" required style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:8px; font-size:1rem;">
        </div>
        <button type="submit" class="submit-btn" style="max-width:100%;">Enter</button>
      </form>
      <p id="loginError" style="color:#dc3545; text-align:center; margin-top:12px; display:none;">Incorrect password</p>
    </div>
  </div>

  <div class="page" id="adminPage" style="display:none;">
    <div class="admin-tabs" id="adminTabs">
      <button class="admin-tab active" data-filter="pending">Pending <span class="badge" id="badgePending">0</span></button>
      <button class="admin-tab" data-filter="approved">Approved <span class="badge" id="badgeApproved">0</span></button>
      <button class="admin-tab" data-filter="rejected">Rejected <span class="badge" id="badgeRejected">0</span></button>
      <button class="admin-tab" data-filter="all">All <span class="badge" id="badgeAll">0</span></button>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Lightbox for full photo view -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" alt="Full photo">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <style>
    .photo-card img { cursor: pointer; }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .lightbox.visible { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(255,255,255,0.2);
      border: none; color: white;
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }
  </style>

  <script>
    // Auth check
    const loginPage = document.getElementById('loginPage');
    const adminPage = document.getElementById('adminPage');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    // Check if already authenticated this session
    if (sessionStorage.getItem('adminAuth') === 'true') {
      showAdmin();
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';
      const password = document.getElementById('passwordInput').value;
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (res.ok) {
          sessionStorage.setItem('adminAuth', 'true');
          showAdmin();
        } else {
          loginError.style.display = 'block';
        }
      } catch (err) {
        loginError.style.display = 'block';
      }
    });

    function showAdmin() {
      loginPage.style.display = 'none';
      adminPage.style.display = 'block';
      loadPhotos();
    }

    // Admin logic
    let photos = [];
    let filter = 'pending';

    async function loadPhotos() {
      const res = await fetch('/api/photos');
      photos = await res.json();
      photos.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
      updateCounts();
      render();
    }

    function updateCounts() {
      document.getElementById('badgePending').textContent = photos.filter(p => p.status === 'pending').length;
      document.getElementById('badgeApproved').textContent = photos.filter(p => p.status === 'approved').length;
      document.getElementById('badgeRejected').textContent = photos.filter(p => p.status === 'rejected').length;
      document.getElementById('badgeAll').textContent = photos.length;
    }

    function render() {
      const grid = document.getElementById('photoGrid');
      const filtered = filter === 'all' ? photos : photos.filter(p => p.status === filter);

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-grid"><div class="icon">📭</div><p>No ' + filter + ' photos</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(photo => {
        const safeId = photo.id.replace(/'/g, "\\'");
        const safeUrl = photo.imageUrl.replace(/'/g, "\\'");
        return `
        <div class="photo-card">
          <img src="${photo.imageUrl}" alt="${escapeAttr(photo.caption)}" loading="lazy" onclick="openLightbox('${safeUrl}')">
          <div class="card-body">
            <h3>${escapeHtml(photo.submittedBy)}</h3>
            <p class="caption">${escapeHtml(photo.caption) || '<em>No caption</em>'}</p>
            <p class="meta">
              <span class="status-badge status-${photo.status}">${photo.status}</span>
              &middot; ${new Date(photo.submittedAt).toLocaleDateString()}
            </p>
            <div class="actions">
              ${photo.status !== 'approved' ? `<button class="btn-approve" onclick="approve('${safeId}')">✓ Approve</button>` : ''}
              ${photo.status !== 'rejected' ? `<button class="btn-reject" onclick="reject('${safeId}')">✗ Reject</button>` : ''}
              <button class="btn-delete" onclick="remove('${safeId}')">🗑️</button>
            </div>
          </div>
        </div>
      `}).join('');
    }

    async function approve(id) {
      await fetch('/api/photos/' + encodeURIComponent(id), {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status: 'approved' })
      });
      showToast('Photo approved!', 'success');
      loadPhotos();
    }

    async function reject(id) {
      await fetch('/api/photos/' + encodeURIComponent(id), {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status: 'rejected' })
      });
      showToast('Photo rejected', 'error');
      loadPhotos();
    }

    async function remove(id) {
      if (!confirm('Delete this photo permanently?')) return;
      await fetch('/api/photos/' + encodeURIComponent(id), { method: 'DELETE' });
      loadPhotos();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const d = document.createElement('div'); d.textContent = text; return d.innerHTML;
    }
    function escapeAttr(text) {
      if (!text) return '';
      return text.replace(/"/g, '&quot;');
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' visible';
      setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    function openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('visible');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    document.getElementById('adminTabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.admin-tab');
      if (!tab) return;
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      filter = tab.dataset.filter;
      render();
    });

    loadPhotos();
    setInterval(loadPhotos, 10000);
  </script>
</body>
</html>
